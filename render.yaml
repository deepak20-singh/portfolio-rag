services:
  - type: web
    name: portfolio-rag-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: GROQ_API_KEY
        sync: false           # paste your key in the Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: TOP_K
        value: "5"
