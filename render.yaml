services:
  - type: web
    name: portfolio-rag-api
    runtime: image
    image:
      url: docker.io/deepaksiingh20/portfolio-rag:1.0.0
    envVars:
      - key: GROQ_API_KEY
        sync: false           # paste your key in the Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: TOP_K
        value: "5"
      - key: PORT
        value: "8000"
